[build]
  command = "npm run build"
  publish = "dist"
  base = "/"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "18"
  NPM_FLAGS = "--production"

[context.deploy-preview]
  command = "npm run build"

[context.production]
  command = "npm run build"

# Explicitly disable Next.js plugin
[[plugins]]
  package = "@netlify/plugin-lighthouse"
